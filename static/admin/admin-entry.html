<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex,nofollow" />
  <title>Administrator Sign In</title>
  <link rel="stylesheet" href="/static/css/style.css" />
  <link rel="stylesheet" href="/static/css/auth.css" />
</head>
<body>
  <div class="page-bg"></div>
  <main class="shell auth-shell">
    <section class="hero-card auth-landing-card glass-highlight">
      <div class="landing-copy">
        <span class="eyebrow">Private Admin Entrance</span>
        <h1>管理员入口</h1>
        <p class="landing-tagline">This page is intentionally not linked from the public login flow.</p>
        <p class="muted">请只把这个地址发给管理员。普通用户继续使用 /login。</p>
      </div>
      <form method="post" action="/login" class="form-card elevated-card auth-form-card">
        <label>管理员用户名或邮箱</label>
        <input name="identifier" maxlength="255" autocomplete="username" required />
        <label>管理员密码</label>
        <input name="password" type="password" autocomplete="current-password" required />
        <button class="primary-btn" type="submit">进入管理后台</button>
        <div class="auth-action-grid compact">
          <a class="auth-action-card" href="/">
            <span class="auth-action-icon">↩</span>
            <span><strong>返回首页</strong><small>Back to public site</small></span>
          </a>
        </div>
      </form>
    </section>
  </main>
</body>
</html>
