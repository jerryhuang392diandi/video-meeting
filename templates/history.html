<!DOCTYPE html>
<html lang="{{ lang }}">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ t('meeting_history') }}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>
  <div class="shell">
    <header class="topbar compact">
      <div class="brand">{{ t('meeting_history') }}</div>
      <div class="top-actions">
        <a class="chip" href="{{ url_for('index') }}">{{ t('nav_home') }}</a>
      </div>
    </header>

    <section class="panel list-panel">
      {% for m in meetings %}
        <div class="list-item">
          <div>
            <div class="item-title">{{ t('room_id') }}: {{ m.room_id }}</div>
            <div class="muted">{{ m.created_at }} · {{ t('status') }}: {{ m.status }}</div>
          </div>
          <a class="primary-btn anchor-btn" href="{{ url_for('room_page', room_id=m.room_id) }}?pwd={{ m.room_password }}">{{ t('rejoin') }}</a>
        </div>
      {% else %}
        <div class="notice">{{ t('no_history') }}</div>
      {% endfor %}
    </section>
  </div>
</body>
</html>
