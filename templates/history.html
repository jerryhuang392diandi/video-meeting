<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>历史会议</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="page">
  <div class="card">
    <div class="row between wrap">
      <h1>历史会议</h1>
      <a class="btn secondary" href="{{ url_for('index') }}">返回首页</a>
    </div>
    <div class="stack top-space">
      {% for m in meetings %}
      <div class="card subcard">
        <div><strong>会议号：</strong>{{ m.room_id }}</div>
        <div><strong>密码：</strong>{{ m.room_password }}</div>
        <div><strong>主持人：</strong>{{ m.host_name }}</div>
        <div><strong>状态：</strong>{{ m.status }}</div>
        <div><strong>创建时间：</strong>{{ m.created_at }}</div>
        <div class="top-space"><a class="btn" href="{{ url_for('room_page', room_id=m.room_id) }}?pwd={{ m.room_password }}">重新进入</a></div>
      </div>
      {% else %}
      <div class="muted">暂无历史会议</div>
      {% endfor %}
    </div>
  </div>
</div>
</body>
</html>
