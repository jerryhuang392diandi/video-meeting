function updateVideoPlaybackPrompt(videoEl, blocked = false) {
  if (!blocked) return;
  setStatus(TEXT_IOS_PLAY_SCREEN, 'warning');
}

async function safePlayVideo(videoEl, { allowMutedFallback = true } = {}) {
  if (!videoEl) return false;
  try {
    const p = videoEl.play?.();
    if (p && typeof p.then === 'function') await p;
    videoEl.dataset.playBlocked = '0';
    updateVideoPlaybackPrompt(videoEl, false);
    return true;
  } catch (_) {
    if (allowMutedFallback && !videoEl.muted) {
      try {
        videoEl.muted = true;
        videoEl.defaultMuted = true;
        const retryMuted = videoEl.play?.();
        if (retryMuted && typeof retryMuted.then === 'function') await retryMuted;
        videoEl.dataset.playBlocked = '0';
        videoEl.dataset.autoMuted = '1';
        updateVideoPlaybackPrompt(videoEl, false);
        return true;
      } catch (_) {}
    }
    videoEl.dataset.playBlocked = '1';
    updateVideoPlaybackPrompt(videoEl, true);
    const retry = () => {
      safePlayVideo(videoEl, { allowMutedFallback: false }).catch(() => {});
      window.removeEventListener('touchstart', retry, true);
      window.removeEventListener('click', retry, true);
    };
    window.addEventListener('touchstart', retry, true);
    window.addEventListener('click', retry, true);
    return false;
  }
}

function queueVideoPlayback(videoEl, delays = [0]) {
  if (!videoEl) return;
  const timers = videoPlaybackRetryTimers.get(videoEl) || [];
  timers.forEach((timer) => clearTimeout(timer));
  const nextTimers = [];
  delays.forEach((delay) => {
    const timer = setTimeout(() => {
      safePlayVideo(videoEl).catch(() => {});
    }, delay);
    nextTimers.push(timer);
  });
  videoPlaybackRetryTimers.set(videoEl, nextTimers);
}

function bindVideoElementLifecycle(videoEl) {
  if (!videoEl || videoEl.dataset.lifecycleBound === '1') return;
  videoEl.dataset.lifecycleBound = '1';
  videoEl.addEventListener('loadedmetadata', () => { queueVideoPlayback(videoEl, [0, 120]); });
  videoEl.addEventListener('canplay', () => { queueVideoPlayback(videoEl, [0, 120]); });
  videoEl.addEventListener('webkitbeginfullscreen', () => {
    nativeFullscreenVideoEl = videoEl;
    roomDebugLog('webkitbeginfullscreen', { id: videoEl.closest('.video-card')?.dataset?.sid || null });
  });
  videoEl.addEventListener('webkitendfullscreen', () => {
    if (nativeFullscreenVideoEl === videoEl) nativeFullscreenVideoEl = null;
    if (screen.orientation?.unlock) {
      try { screen.orientation.unlock(); } catch (_) {}
    }
    flushPendingLayoutIfNeeded();
    roomDebugLog('webkitendfullscreen', { id: videoEl.closest('.video-card')?.dataset?.sid || null });
  });
}

function updateShareUiState() {
  const canShare = !!navigator.mediaDevices?.getDisplayMedia;
  const occupiedByOther = !!currentSharerSid && currentSharerSid !== 'local';
  if (shareScreenBtn) {
    shareScreenBtn.disabled = !canShare || occupiedByOther;
    shareScreenBtn.title = !canShare
      ? {{ t('screen_share_not_supported')|tojson }}
      : (occupiedByOther ? {{ t('another_participant_sharing_screen')|tojson }} : '');
  }
  updateVirtualBackgroundButtonState();
}

function applySnapshotSharerState(nextSharerSid) {
  let normalizedSid = normalizeParticipantSid(nextSharerSid || null);
  if (normalizedSid && normalizedSid !== socket.id && !participantMeta[normalizedSid]) {
    normalizedSid = null;
  }
  if (normalizedSid === socket.id && !isSharingScreen && !livekitLocalShareActive) {
    normalizedSid = null;
  }
  currentSharerSid = normalizedSid;
  if (currentSharerSid) {
    focusedSid = currentSharerSid;
    hiddenSidebar = true;
  } else {
    if (focusedSid !== 'local' && !participantMeta[focusedSid]) {
      focusedSid = 'local';
    }
    hiddenSidebar = false;
  }
  syncScreenShareSpeakerRule({ userGesture: false });
  updateShareUiState();
  queueRenderLayout();
}

function updateVirtualBackgroundButtonState() {
  if (!virtualBgBtn) return;
  const disabledByShare = !!isSharingScreen || !!currentSharerSid;
  virtualBgBtn.disabled = disabledByShare;
  virtualBgBtn.classList.toggle('active', !!virtualBgEnabled);
  if (disabledByShare) {
    virtualBgBtn.title = {{ t('virtual_bg_unavailable_during_share')|tojson }};
  } else if (virtualBgEnabled) {
    virtualBgBtn.title = TEXT_VIRTUAL_BG_OFF;
  } else {
    virtualBgBtn.title = TEXT_BLUR_BG_TIP;
  }
}

  try {
    const raw = localStorage.getItem(storageKey);
    if (!raw) return fallback;
    const parsed = JSON.parse(raw);
    if (typeof parsed?.enabled !== 'boolean') return fallback;
    if (typeof parsed?.basePreference !== 'boolean') return fallback;
    if (parsed.basePreference !== fallback) {
      localStorage.removeItem(storageKey);
      return fallback;
    }
    return parsed.enabled;
  } catch (_) {
    return fallback;
  }
}

function writeSpeakerPreference(enabled) {
  const storageKey = getSpeakerPreferenceStorageKey();
  const payload = JSON.stringify({
    enabled: !!enabled,
    basePreference: !!PREF_AUTO_ENABLE_SPEAKER,
  });
  try {
    localStorage.setItem(storageKey, payload);
  } catch (_) {}
}

function migrateLegacySpeakerPreference() {
  const storageKey = getSpeakerPreferenceStorageKey();
  try {
    if (localStorage.getItem(storageKey) != null) return;
    const legacyRaw = localStorage.getItem(LEGACY_SPEAKER_PREFERENCE_KEY);
    if (legacyRaw == null) return;
    writeSpeakerPreference(legacyRaw !== '0');
    localStorage.removeItem(LEGACY_SPEAKER_PREFERENCE_KEY);
  } catch (_) {}
}

function writeReloadRecoveryHint() {
  const livekitState = IS_LIVEKIT_MODE && livekitController?.isConnected?.()
    ? (livekitController.getLocalMediaState?.() || {})

  const payload = {
    ts: Date.now(),
    hadScreenShare: livekitState ? !!livekitState.screenShareEnabled : !!isSharingScreen,
    cameraEnabled: livekitState ? !!livekitState.cameraEnabled : !!localStream?.getVideoTracks?.().some((track) => track.enabled),
    micEnabled: livekitState ? !!livekitState.microphoneEnabled : !!localStream?.getAudioTracks?.().some((track) => track.enabled),
  };
  try {
    sessionStorage.setItem(RELOAD_RECOVERY_KEY, JSON.stringify(payload));
  } catch (_) {}
}

function readReloadRecoveryHint() {
  try {
    const raw = sessionStorage.getItem(RELOAD_RECOVERY_KEY);
    if (!raw) return null;
    sessionStorage.removeItem(RELOAD_RECOVERY_KEY);
    const parsed = JSON.parse(raw);
    if (!parsed || typeof parsed !== 'object') return null;
    if (Date.now() - Number(parsed.ts || 0) > 2 * 60 * 1000) return null;
    return parsed;
  } catch (_) {
    return null;
  }
}

function isBadShareSample(snapshot, profile) {
  if (!snapshot) return false;
  const qualityLimited = !!snapshot.qualityLimitationReason && snapshot.qualityLimitationReason !== 'none';
  const lowHeadroom = Number.isFinite(snapshot.outboundKbps)
    && Number.isFinite(snapshot.targetBitrateKbps)
    && snapshot.targetBitrateKbps > 0
    && snapshot.outboundKbps < Math.round(snapshot.targetBitrateKbps * 0.58);
  if (profile.mode === 'motion') {
    if (Number.isFinite(snapshot.fps) && snapshot.fps < 20 && (qualityLimited || lowHeadroom)) return true;
    if (Number.isFinite(snapshot.fps) && snapshot.fps < 18) return true;
  } else {
    if (Number.isFinite(snapshot.fps) && snapshot.fps < 10 && qualityLimited) return true;
    if (lowHeadroom && qualityLimited) return true;
  }
  return (Number.isFinite(snapshot.rttMs) && snapshot.rttMs > 420 && (qualityLimited || lowHeadroom))
    || (Number.isFinite(snapshot.packetsLost) && snapshot.packetsLost > 20 && qualityLimited);
}

async function maybePromptShareProfileFallback() {
  if (!livekitLocalShareActive || document.hidden) return;
  const now = Date.now();
  if (shareStabilityMonitor.promptCooldownUntil > now) return;
  const controller = livekitController;
  if (!controller?.getScreenShareSenderSnapshot) return;
  const snapshot = await controller.getScreenShareSenderSnapshot();
  if (!isBadShareSample(snapshot, shareProfilePreference)) {
    shareStabilityMonitor.badSampleCount = 0;
    return;
  }
  shareStabilityMonitor.badSampleCount += 1;
  if (shareStabilityMonitor.badSampleCount < 3) return;
  shareStabilityMonitor.badSampleCount = 0;
  shareStabilityMonitor.promptCooldownUntil = now + 45000;
  const fallback = controller.getFallbackScreenShareProfile?.();
  if (!fallback) {
    setStatus(TEXT_SHARE_PROFILE_STABILITY_MANUAL, 'warning');
    return;
  }
  const confirmed = window.confirm(TEXT_SHARE_PROFILE_STABILITY_PROMPT);
  if (!confirmed) {
    setStatus(TEXT_SHARE_PROFILE_STABILITY_KEPT, 'warning');
    return;
  }
  await applyShareProfilePreference(fallback, { applyToActiveShare: true, showStatus: false });
  setStatus(TEXT_SHARE_PROFILE_STABILITY_APPLIED, 'warning');
}

function startShareStabilityMonitor() {
  clearShareStabilityMonitor();

function syncScreenShareSpeakerRule({ userGesture = false } = {}) {
  const hasActiveShare = !!currentSharerSid || !!isSharingScreen || !!livekitLocalShareActive;

    if (!speakerEnabled) {

      setSpeakerEnabled(true, { userGesture, persist: true, showStatus: false });

    return;
  }
  if (speakerForcedByShareRule && speakerStateBeforeShare === false) {
    setSpeakerEnabled(false, { userGesture: false, persist: true, showStatus: false });
  }
  speakerForcedByShareRule = false;
  speakerStateBeforeShare = null;
}

function applySimulatedFullscreen(card, sid) {

  simulatedFullscreenCardSid = sid || card.dataset.sid || null;
  roomDebugLog('simulated fullscreen applied', { sid: simulatedFullscreenCardSid });
  return true;
}

async function exitAnyFullscreen(videoEl = null) {
  clearSimulatedFullscreen();
  if (document.exitFullscreen && getFullscreenElement()) {
    return document.exitFullscreen();
  }
  if (document.webkitExitFullscreen && getFullscreenElement()) {
    return document.webkitExitFullscreen();
  }
  if (document.msExitFullscreen && getFullscreenElement()) {
    return document.msExitFullscreen();
  }
  const nativeTarget = videoEl || nativeFullscreenVideoEl;
  if (nativeTarget?.webkitDisplayingFullscreen && nativeTarget.webkitExitFullscreen) {
    return nativeTarget.webkitExitFullscreen();
  }
  if (nativeFullscreenVideoEl?.webkitExitFullscreen) {
    return nativeFullscreenVideoEl.webkitExitFullscreen();
  }
}

async function requestBestFullscreen({ card, videoEl, preferVideo = false, sid = null } = {}) {
  const candidates = preferVideo ? [videoEl, card] : [card, videoEl];
  for (const el of candidates) {
    if (!el) continue;
    try {
      roomDebugLog('try fullscreen candidate', { sid, tag: el.tagName, hasRequest: !!el.requestFullscreen, hasWebkit: !!el.webkitRequestFullscreen, hasVideoWebkit: !!el.webkitEnterFullscreen });
      if (el.requestFullscreen) {
        try {
          await el.requestFullscreen({ navigationUI: 'hide' });
        } catch (err) {
          roomDebugLog('requestFullscreen with options failed, retrying without options', err?.message || err);
          await el.requestFullscreen();
        }
        return getFullscreenElement() === el || getFullscreenElement() === card || true;
      }
      if (el.webkitRequestFullscreen) {
        el.webkitRequestFullscreen();
        return true;
      }
      if (el.msRequestFullscreen) {
        el.msRequestFullscreen();
        return true;
      }
      if (el.webkitEnterFullscreen) {
        el.webkitEnterFullscreen();
        return true;
      }
    } catch (err) {
      roomDebugLog('fullscreen candidate failed', { sid, error: err?.message || String(err) });
    }
  }
  return applySimulatedFullscreen(card, sid);
}

async function toggleCardFullscreen(card, sid) {
  const videoEl = card?.querySelector('.video-el') || card?.querySelector('video');
  const isMobile = window.matchMedia('(max-width: 768px)').matches;
  const isScreenShareCard = currentSharerSid === sid;
  const activeFullscreenEl = getFullscreenElement();
  const simulatedCard = getSimulatedFullscreenCard();
  const isSameFullscreen = !!activeFullscreenEl && (activeFullscreenEl === card || activeFullscreenEl === videoEl);
  const isSimulatedSame = !!simulatedCard && simulatedCard === card;
  const isVideoNativeFullscreen = !!(videoEl?.webkitDisplayingFullscreen);

  roomDebugLog('toggle fullscreen', { sid, isMobile, isScreenShareCard, isSameFullscreen, isSimulatedSame, isVideoNativeFullscreen });

  if (isSameFullscreen || isSimulatedSame || isVideoNativeFullscreen) {
    await exitAnyFullscreen(videoEl);
    return;
  }

  const preferVideo = isScreenShareCard || isMobile;
  const entered = await requestBestFullscreen({ card, videoEl, preferVideo, sid });
  roomDebugLog('fullscreen result', { sid, entered, active: !!getFullscreenElement(), simulated: !!getSimulatedFullscreenCard() });
  if (entered && (isScreenShareCard || isMobile) && screen.orientation?.lock) {
    screen.orientation.lock('landscape').catch(() => {});
  }
}

function updateVideoPager(totalCards, totalPages) {
  if (!videoPager || !videoPrevPageBtn || !videoNextPageBtn || !videoPagerInfo) return;
  const pageSize = getGridPageSize();
  const hasSearch = !!getVideoSearchKeyword();
  const showPager = !currentSharerSid && ((totalCards > pageSize && totalPages > 1) || hasSearch);
  videoPager.classList.toggle('hidden', !showPager);
  if (!showPager) {
    videoPagerInfo.textContent = '1 / 1';
    if (videoHomePageBtn) videoHomePageBtn.disabled = true;
    if (videoSearchInput) videoSearchInput.value = videoSearchKeyword;
    return;
  }
  videoPagerInfo.textContent = `${currentGridPage + 1} / ${totalPages}`;
  videoPrevPageBtn.disabled = currentGridPage <= 0;
  videoNextPageBtn.disabled = currentGridPage >= totalPages - 1;
  if (videoHomePageBtn) videoHomePageBtn.disabled = currentGridPage <= 0;
  if (videoSearchInput && videoSearchInput.value !== videoSearchKeyword) videoSearchInput.value = videoSearchKeyword;

function getVideoSearchKeyword() {
  return String(videoSearchKeyword || '').trim().toLocaleLowerCase('zh-Hans-CN');
}

function getRenderableCards() {
  const orderedSids = ['local', ...Object.keys(participantMeta)];
  const seen = new Set();
  const keyword = getVideoSearchKeyword();
  return orderedSids
    .filter(sid => {
      if (seen.has(sid)) return false;
      seen.add(sid);
      if (!keyword) return true;
      const displayName = sid === 'local' ? getDisplayName('local') : getDisplayName(sid);
      const haystack = `${displayName || ''} ${sid || ''} ${ROOM_ID || ''}`.toLocaleLowerCase('zh-Hans-CN');
      return haystack.includes(keyword);
    })
    .map(sid => ensureCard(
      sid,
      sid === 'local' ? getDisplayName('local') : getDisplayName(sid),
      sid === 'local'
    ));
}

function renderLayout(force = false) {
  if (!videoMain || !videoSidebar || !videoStage) return;
  clearDockedCardState();
  if (!force && hasActiveFullscreenSession()) {
    layoutScheduler.defer();
    roomDebugLog('renderLayout deferred due to active fullscreen');
    return;
  }
  const cards = getRenderableCards();
  if (!cards.length) {
    videoMain.innerHTML = '<div class="video-empty-state">' + escapeHtml({{ t('no_matching_participants')|tojson }}) + '</div>';
    videoSidebar.innerHTML = '';
    if (hiddenParticipantDock) hiddenParticipantDock.innerHTML = '';
    videoStage.classList.remove('grid-1', 'grid-2', 'grid-3', 'paged-grid', 'focus-layout', 'grid-layout');
    videoStage.classList.add('sidebar-hidden');
    updateVideoPager(0, 1);
    return;
  }

  videoMain.innerHTML = '';
  videoSidebar.innerHTML = '';
  if (hiddenParticipantDock) hiddenParticipantDock.innerHTML = '';

  cards.forEach(card => card.classList.remove('is-focused', 'is-sidebar'));
  videoStage.classList.remove('grid-1', 'grid-2', 'grid-3', 'paged-grid');

  const pageSize = getGridPageSize();
  const totalPages = Math.max(1, Math.ceil(cards.length / pageSize));
  currentGridPage = Math.max(0, Math.min(currentGridPage, totalPages - 1));

  let focusTarget = null;
  if (currentSharerSid) {
    focusTarget = cards.find(card => card.dataset.sid === currentSharerSid)
      || document.getElementById('card-' + currentSharerSid);
  }
  if (!focusTarget && focusedSid) {
    focusTarget = cards.find(card => card.dataset.sid === focusedSid)
      || document.getElementById('card-' + focusedSid);
  }
  if (!focusTarget) {
    focusTarget = document.getElementById('card-local') || cards[0];
  }
  if (!focusTarget) return;

  const canUseGrid = !currentSharerSid && !hiddenSidebar;
  const shouldUseGrid = canUseGrid && cards.length <= pageSize;
  const shouldUsePagedGrid = canUseGrid && cards.length > pageSize;

  syncScreenShareCardState();
  videoStage.classList.toggle('screen-share-mode', !!currentSharerSid);
  videoStage.classList.toggle('grid-layout', shouldUseGrid || shouldUsePagedGrid);
  videoStage.classList.toggle('focus-layout', !shouldUseGrid && !shouldUsePagedGrid);

  if (shouldUseGrid || shouldUsePagedGrid) {
    videoStage.classList.add('sidebar-hidden');
    const start = shouldUsePagedGrid ? currentGridPage * pageSize : 0;
    const end = shouldUsePagedGrid ? start + pageSize : cards.length;
    const visibleCards = cards.slice(start, end);
    const gridCols = getGridColumns(visibleCards.length);
    videoStage.classList.add(`grid-${gridCols}`);
    if (shouldUsePagedGrid) videoStage.classList.add('paged-grid');
    visibleCards.forEach(card => videoMain.appendChild(card));
    updateVideoPager(cards.length, totalPages);
    updateScreenShareBanner();
    updateShareUiState();
    scheduleParticipantVideoResume();
    return;
  }

  updateVideoPager(cards.length, totalPages);
  focusTarget.classList.add('is-focused');
  videoMain.appendChild(focusTarget);

  const hiddenCards = currentSharerSid ? cards.filter(card => card !== focusTarget) : [];
  const sidebarCards = currentSharerSid ? [] : cards.filter(card => card !== focusTarget);
  sidebarCards.forEach(card => {
    card.classList.add('is-sidebar');
    videoSidebar.appendChild(card);
  });
  hiddenCards.forEach(card => {
    card.classList.add('is-docked');
    if (hiddenParticipantDock) hiddenParticipantDock.appendChild(card);
  });

  videoStage.classList.toggle('sidebar-hidden', !!currentSharerSid || hiddenSidebar || sidebarCards.length === 0);
  updateScreenShareBanner();
  updateShareUiState();
  scheduleParticipantVideoResume();
}

function setParticipantMeta(sid, { name = null, isHost = false } = {}) {
  if (!sid || sid === socket.id) return null;
  const nextMeta = {
    name: name || participantMeta[sid]?.name || sid,
    isHost: !!isHost,
  };
  participantMeta[sid] = nextMeta;
  window.participantMeta = participantMeta;
  return nextMeta;
}

function addRemoteParticipant(sid, name, isHost = false) {
  const meta = setParticipantMeta(sid, { name, isHost });
  if (!meta) return null;
  const card = ensureCard(sid, meta.name, false);
  updatePlaceholder(card, false);
  currentGridPage = 0;
  queueRenderLayout();
  updateParticipantCount();
  return card;
}

function syncParticipantRoster(participants = [], { pruneMissing = false } = {}) {
  const keep = new Set();
  participants.forEach((participant) => {
    const sid = participant?.sid;
    if (!sid || sid === socket.id) return;
    keep.add(sid);
    const existed = !!participantMeta[sid];
    if (!existed) {
      addRemoteParticipant(sid, participant.name || sid, !!participant.is_host);
      return;
    }
    setParticipantMeta(sid, { name: participant.name || sid, isHost: !!participant.is_host });
    const labelEl = document.querySelector(`#card-${CSS.escape(sid)} .video-label`);
    if (labelEl) labelEl.textContent = participantMeta[sid].name;
  });
  if (pruneMissing) {
    Object.keys(participantMeta).forEach((sid) => {
      if (keep.has(sid)) return;
      removeRemoteVideo(sid);
    });
  }
}

function addRemoteVideo(sid, stream) {
  const card = ensureCard(sid, getDisplayName(sid), false);
  const videoEl = card.querySelector('video');
  if (videoEl.srcObject !== stream) videoEl.srcObject = stream;
  const hasRenderableVideo = !!stream?.getVideoTracks?.().some((track) => track.readyState === 'live' && track.enabled !== false);
  queueVideoPlayback(videoEl, [0, 120, 260]);
  updatePlaceholder(card, hasRenderableVideo);
  applySpeakerState({ userGesture: mediaPlaybackActivated });
  queueRenderLayout();
}

function clearRemoteMedia(sid) {
  const card = document.getElementById('card-' + sid);
  if (!card) return;
  const videoEl = card.querySelector('video');
  if (videoEl && videoEl.srcObject) videoEl.srcObject = null;
  delete remoteMediaStreams[sid];
  updatePlaceholder(card, false);
  if (currentSharerSid === sid) {
    currentSharerSid = null;
    hiddenSidebar = false;
  }
  syncScreenShareSpeakerRule({ userGesture: false });
  updateShareUiState();
  queueRenderLayout();
}

function removeRemoteVideo(sid) {
  document.getElementById('card-' + sid)?.remove();
  delete remoteMediaStreams[sid];
  delete participantMeta[sid];
  window.participantMeta = participantMeta;
  if (focusedSid === sid) focusedSid = 'local';
  if (currentSharerSid === sid) {
    currentSharerSid = null;
    hiddenSidebar = false;
    setStatus(TEXT_SCREEN_SHARE_STOPPED);
  }
  syncScreenShareSpeakerRule({ userGesture: false });
  updateShareUiState();
  const totalCards = document.querySelectorAll('.video-card').length;
  const totalPages = Math.max(1, Math.ceil(totalCards / getGridPageSize()));
  currentGridPage = Math.min(currentGridPage, totalPages - 1);
  queueRenderLayout();
  updateParticipantCount();
}

function handleLocalLiveKitScreenShareState(isActive) {

async function restoreLiveKitMediaAfterReload(hint) {
  if (!IS_LIVEKIT_MODE || !hint) return false;
  const shouldRestoreCamera = !!hint.cameraEnabled;
  const shouldRestoreMicrophone = !!hint.micEnabled;
  if (!shouldRestoreCamera && !shouldRestoreMicrophone) {
    if (hint.hadScreenShare) {
      setStatus({{ t('screen_share_restore_manual')|tojson }});
    }
    return false;
  }
  const controller = await ensureLiveKitConnected();
  if (!controller) return false;
  await Promise.allSettled([
    controller.setCameraEnabled(shouldRestoreCamera),
    controller.setMicrophoneEnabled(shouldRestoreMicrophone),
  ]);
  setStatus({{ t('media_recovered_refresh_screen_share_manual')|tojson }});
  return true;
}

function ensureLiveKitController() {
  if (!IS_LIVEKIT_MODE) return null;
  if (livekitController) return livekitController;
  if (!window.RoomPageLiveKit) {
    setStatus(TEXT_LIVEKIT_CONFIG_MISSING, 'error');
    return null;
  }
  livekitController = window.RoomPageLiveKit.createController({
    url: LIVEKIT_URL,
    tokenEndpoint: LIVEKIT_TOKEN_ENDPOINT,
    roomId: ROOM_ID,
    roomPassword: ROOM_PASSWORD,
    roomOptions: window.RoomPageLiveKit.buildRoomOptions?.() || {},
    initialShareProfile: shareProfilePreference,
    isHost: IS_HOST === true || IS_HOST === 'true',
    getParticipantSid: () => socket.id,
    getDisplayName: () => USER_NAME,
    addRemoteVideo: (sid, stream) => {
      remoteMediaStreams[sid] = stream;
      addRemoteVideo(sid, stream);
    },
    clearRemoteMedia: (sid) => {
      clearRemoteMedia(sid);
    },
    removeRemoteVideo: (sid) => {
      delete remoteMediaStreams[sid];
      removeRemoteVideo(sid);
    },
    setLocalPreview: setLocalPreviewForLiveKit,
    onScreenShareState: updateLiveKitShareFocus,
    onLocalScreenShareState: handleLocalLiveKitScreenShareState,
    setStatus,
    textLiveKitReconnecting: TEXT_LIVEKIT_RECONNECTING,
    textLiveKitReconnected: TEXT_LIVEKIT_RECONNECTED,
  });
  return livekitController;
}

async function ensureLiveKitConnected() {
  if (!IS_LIVEKIT_MODE) return null;
  if (!LIVEKIT_ENABLED || !LIVEKIT_URL || !LIVEKIT_TOKEN_ENDPOINT) {
    setStatus(TEXT_LIVEKIT_CONFIG_MISSING, 'error');
    return null;
  }
  const controller = ensureLiveKitController();
  if (!controller || controller.isConnected()) return controller;
  try {
    await controller.connect();
    return controller;
  } catch (err) {
    console.error(err);
    setStatus(`${TEXT_LIVEKIT_CONNECT_FAILED}: ${err?.message || 'unknown error'}`, 'error');
    throw err;
  }
}

function shouldAutoBootstrapJoinMedia() {
  return !!(
    IS_LIVEKIT_MODE
    && !joinMediaBootstrapDone
    && !joinMediaBootstrapTimer
    && (PREF_AUTO_ENABLE_CAMERA || PREF_AUTO_ENABLE_MICROPHONE)
  );
}

async function bootstrapPreferredJoinMedia() {
  const controller = await ensureLiveKitConnected();
  if (!controller) return false;
  await Promise.allSettled([
    PREF_AUTO_ENABLE_CAMERA ? controller.setCameraEnabled(true) : Promise.resolve(),
    PREF_AUTO_ENABLE_MICROPHONE ? controller.setMicrophoneEnabled(true) : Promise.resolve(),
  ]);
  joinMediaBootstrapDone = true;
  return true;
}

function scheduleJoinMediaBootstrap() {
  if (!shouldAutoBootstrapJoinMedia()) {
    if (IS_LIVEKIT_MODE && !PREF_AUTO_ENABLE_CAMERA && !PREF_AUTO_ENABLE_MICROPHONE) {
      joinMediaBootstrapDone = true;
    }
    return;
  }
  joinMediaBootstrapTimer = window.setTimeout(async () => {
    joinMediaBootstrapTimer = null;
    if (hasLeftMeeting) return;
    try {
      await bootstrapPreferredJoinMedia();
    } catch (err) {
      console.error(err);
    }
  }, 180);
}

async function toggleScreenShareAction() {
  const controller = await ensureLiveKitConnected();
  if (!controller) return;
  await controller.setScreenShareProfile?.(shareProfilePreference, { applyToActiveShare: false });
  const mediaState = controller.getLocalMediaState?.() || {};
  let includeAudio = screenShareAudioPrefs.includeAudio;
  let keepMicWhenAudio = screenShareAudioPrefs.keepMicWhenAudio;
  if (!mediaState.screenShareEnabled) {
    if (virtualBgEnabled) {
      await deactivateVirtualBackground(TEXT_VIRTUAL_BG_OFF, { stopCanvas: true });
      cleanupVirtualBackgroundRawStream();
    }
    if (speakerStateBeforeShare === null) speakerStateBeforeShare = speakerEnabled;
    setSpeakerEnabled(true, { userGesture: true, persist: true, showStatus: false });
    speakerForcedByShareRule = !speakerStateBeforeShare;
    const audioMode = chooseScreenShareAudioMode();
    includeAudio = !!audioMode.includeAudio;
    keepMicWhenAudio = !!audioMode.keepMic;
    screenShareAudioPrefs.includeAudio = includeAudio;
    screenShareAudioPrefs.keepMicWhenAudio = keepMicWhenAudio;
    await applyScreenShareMicPolicy(controller, mediaState, { includeAudio, keepMic: keepMicWhenAudio });
    if (includeAudio && !keepMicWhenAudio && contentOnlyShareMicState.micTemporarilyMuted) {
      setStatus(TEXT_SCREEN_SHARE_AUDIO_CONTENT_ONLY);
    } else {
      setStatus(includeAudio ? TEXT_SCREEN_SHARE_AUDIO_ON : TEXT_SCREEN_SHARE_AUDIO_OFF);
    }
  }
  try {
    await controller.setScreenShareEnabled(undefined, {
      includeAudio: mediaState.screenShareEnabled ? undefined : includeAudio,
      profile: shareProfilePreference,
    });
    if (!mediaState.screenShareEnabled && includeAudio) {
      verifySharedAudioAvailability(controller).catch(() => {});
    }
  } catch (err) {
    if (!mediaState.screenShareEnabled) {
      await restoreMicrophoneAfterContentOnlyShare(controller).catch(() => {});
    }
    setStatus(err?.message || TEXT_LIVEKIT_CONNECT_FAILED, 'error');
    throw err;
  }
}

async function translateToEnglish(item, text) {
  if (!text || !item) return;
  let box = item.querySelector('.chat-translation');
  if (!box) {
    box = document.createElement('div');
    box.className = 'chat-translation';
    item.appendChild(box);
  }
  box.textContent = {{ t('translating')|tojson }};
  try {
    const resp = await fetch('/api/translate_message', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text })
    });
    const data = await resp.json();
    if (!resp.ok || !data.ok) throw new Error(data.error || 'translate_failed');
    const target = String(data.target || '').toLowerCase();
    const label = target.startsWith('zh') ? {{ t('chinese_translation')|tojson }} : {{ t('english_translation')|tojson }};
    box.innerHTML = `<div class="chat-translation-label">${escapeHtml(label)}</div><div>${escapeHtml(data.translation || '')}</div>`;
    setStatus({{ t('translation_shown_below')|tojson }});
  } catch (err) {
    box.textContent = {{ t('translation_failed_retry')|tojson }};
    setStatus(box.textContent, 'warning');
  }
}

async function uploadPendingAttachment() {
  if (!pendingAttachment?.file) return null;
  const formData = new FormData();
  formData.append('room_id', ROOM_ID);
  formData.append('permission', chatAttachmentPermission?.value || 'download');
  formData.append('file', pendingAttachment.file, pendingAttachment.name || pendingAttachment.file.name || 'attachment');
  const endpoint = pendingAttachment.uploadKind === 'media' ? '/api/chat_upload_media' : '/api/chat_upload_doc';
  const resp = await fetch(endpoint, { method: 'POST', body: formData });
  const contentType = resp.headers.get('content-type') || '';
  let data = null;
  if (contentType.includes('application/json')) {
    data = await resp.json();
  } else {
    const text = await resp.text().catch(() => '');
    data = { ok: false, error: text || `http_${resp.status}` };
  }
  if (!resp.ok || !data.ok) {
    const errorCode = data?.error || `http_${resp.status}`;
    throw new Error(errorCode);
  }
  return data.attachment;
}

async function sendChatMessage() {
  const message = (chatInput.value || '').trim();
  if (!message && !pendingAttachment) return;
  let attachmentPayload = null;
  if (pendingAttachment) {
    try {
      attachmentPayload = await uploadPendingAttachment();
    } catch (err) {
      console.error(err);
      const msg = String(err?.message || '');
      if (msg.includes('room_storage_limit') || msg.includes('server_storage_limit')) {
        setStatus(TEXT_ROOM_STORAGE_LIMIT, 'warning');
      } else if (msg.includes('file_too_large') || msg.includes('http_413')) {
        const file = pendingAttachment?.file;
        const extra = msg.includes('http_413')
          ? {{ t('upload_limit_nginx_hint')|tojson }}
          : '';
        const baseMsg = file?.type?.startsWith('image/') ? TEXT_ATTACHMENT_LIMIT_IMAGE : (file?.type?.startsWith('video/') ? TEXT_ATTACHMENT_LIMIT_VIDEO : TEXT_ATTACHMENT_LIMIT_FILE);
        setStatus(`${baseMsg}${extra}`, 'warning');
      } else if (msg.includes('file_type_not_allowed')) {
        setStatus({{ t('media_format_rejected')|tojson }}, 'error');
      } else if (msg.includes('upload_internal_error')) {
        setStatus(TEXT_UPLOAD_FAILED + (msg ? ` (${msg})` : '') + {{ t('backend_internal_error_retry')|tojson }}, 'error');
      } else {
        setStatus(TEXT_UPLOAD_FAILED + (msg ? ` (${msg})` : ''), 'error');
      }
      return;
    }
  }
  socket.emit('meeting_chat_send', {
    room_id: ROOM_ID,
    mode: activeChatMode,
    message,
    mentions: extractMentions(message),
    attachment: attachmentPayload,
  });
  chatInput.value = '';
  pendingAttachment = null;
  updateAttachmentPreview();
}

function normalizeChatLayout() {
  if (!chatWindow || !chatComposer) return;
  if (chatAttachmentPreview && chatAttachmentPreview.parentElement !== chatComposer) {
    chatComposer.insertBefore(chatAttachmentPreview, chatComposer.firstChild);
  }
  if (chatPermissionRow && chatPermissionRow.parentElement !== chatComposer) {
    chatComposer.insertBefore(chatPermissionRow, chatComposer.firstChild);
  }
}

function enableChatDrag() {
  const handle = document.getElementById('chatMobileHandle');
  if (!chatWindow || !handle) return;
  if (handle.dataset.bound === '1') return;
  handle.dataset.bound = '1';

  const isMobile = () => window.matchMedia('(max-width: 768px)').matches;
  const setHeight = (valuePx) => {
    const viewport = window.innerHeight || document.documentElement.clientHeight || 800;
    const minPx = Math.max(320, Math.round(viewport * 0.42));
    const maxPx = Math.max(minPx + 80, Math.round(viewport * 0.84));
    const next = Math.max(minPx, Math.min(maxPx, valuePx));
    chatWindow.style.setProperty('--mobile-chat-height', `${next}px`);
    return next;
  };

  const syncDefault = () => {
    if (!isMobile()) {
      chatWindow.style.removeProperty('--mobile-chat-height');
      return;
    }
    if (!chatWindow.style.getPropertyValue('--mobile-chat-height')) {
      setHeight(Math.round((window.innerHeight || 800) * 0.62));
    }
  };

  let dragging = false;
  let startY = 0;
  let startHeight = 0;

  const getY = (event) => event.touches?.[0]?.clientY ?? event.clientY;

  const onMove = (event) => {
    if (!dragging || !isMobile()) return;
    const currentY = getY(event);
    if (typeof currentY !== 'number') return;
    const delta = startY - currentY;
    setHeight(startHeight + delta);
    event.preventDefault?.();
  };

  const stopDrag = () => {
    dragging = false;
    document.body.classList.remove('chat-dragging');
  };

  const startDrag = (event) => {
    if (!isMobile()) return;
    dragging = true;
    startY = getY(event);
    startHeight = chatWindow.getBoundingClientRect().height;
    document.body.classList.add('chat-dragging');
    event.preventDefault?.();
  };

  handle.addEventListener('touchstart', startDrag, { passive: false });
  handle.addEventListener('mousedown', startDrag);
  window.addEventListener('touchmove', onMove, { passive: false });
  window.addEventListener('mousemove', onMove);
  window.addEventListener('touchend', stopDrag);
  window.addEventListener('mouseup', stopDrag);
  window.addEventListener('resize', syncDefault);
  window.addEventListener('resize', refreshChatCollapsedLayout);
  syncDefault();
}


function refreshChatCollapsedLayout() {
  if (!chatWindow) return;
  const collapsed = chatWindow.classList.contains('chat-collapsed');
  document.querySelector('.video-panel')?.classList.toggle('chat-collapsed-layout', !!collapsed && !window.matchMedia('(max-width: 768px)').matches);
}

function setChatCollapsed(collapsed) {
  if (!chatWindow) return;
  const showBtn = document.getElementById('chatShowBtn');
  const isMobile = window.matchMedia('(max-width: 768px)').matches;
  chatWindow.classList.toggle('chat-collapsed', !!collapsed);
  document.querySelector('.video-panel')?.classList.toggle('chat-collapsed-layout', !!collapsed && !isMobile);
  if (showBtn) {
    showBtn.classList.toggle('hidden', !collapsed);
    showBtn.style.display = collapsed ? 'inline-flex' : 'none';
  }
}

function initChatUi() {
  normalizeChatLayout();
  enableChatDrag();
  if (chatMessages) chatMessages.dataset.stuckBottom = '1';
  setChatCollapsed(false);
  renderMentionPicker();
  setChatMode('all');
  document.querySelectorAll('.chat-mode-btn').forEach(btn => btn.addEventListener('click', () => setChatMode(btn.dataset.mode)));
  document.getElementById('clearChatBtn')?.addEventListener('click', () => {
    if (confirm({{ t('clear_current_meeting_chat_confirm')|tojson }})) {
      socket.emit('meeting_chat_clear');
    }
  });
  chatAttachmentPermission?.addEventListener('change', updateAttachmentPreview);
  sendChatBtn?.addEventListener('click', sendChatMessage);
  chatInput?.addEventListener('keydown', (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendChatMessage(); } });
  document.getElementById('mentionBtn')?.addEventListener('click', () => { const willShow = mentionPicker.classList.contains('hidden'); emojiPopover?.classList.add('hidden'); if (willShow) { renderMentionPicker(''); mentionPicker.classList.remove('hidden'); } else { mentionPicker.classList.add('hidden'); } });
  document.getElementById('emojiBtn')?.addEventListener('click', () => { renderEmojiPicker(); emojiPopover?.classList.toggle('hidden'); mentionPicker.classList.add('hidden'); });
  document.getElementById('emojiCloseBtn')?.addEventListener('click', () => emojiPopover?.classList.add('hidden'));
  chatMessages?.addEventListener('scroll', () => {
    chatMessages.dataset.stuckBottom = isChatNearBottom() ? '1' : '0';
  }, { passive: true });

  chatMessages?.addEventListener('click', async (event) => {
    const btn = event.target.closest('.msg-action-btn');
    if (!btn) return;
    const item = btn.closest('.chat-message');
    if (!item) return;
    const action = btn.dataset.action;
    const text = getMessageTextForTranslate(item);
    if (action === 'copy') {
      await copyText(text);
    } else if (action === 'translate') {
      await translateToEnglish(item, text);
    } else if (action === 'retract') {
      socket.emit('meeting_chat_retract', { id: item.dataset.messageId });
    }
  });
  document.addEventListener('click', (e) => { if (!e.target.closest('#emojiBtn') && !e.target.closest('#emojiPopover') && !e.target.closest('#mentionBtn') && !e.target.closest('#mentionPicker')) hideFloatingPanels(); });
  const prepareAttachment = async (file, uploadKind) => {
    if (!file) return;
    try {
      const isImage = file.type.startsWith('image/');
      const isVideo = file.type.startsWith('video/');
      const ext = (file.name.split('.').pop() || '').toLowerCase();
      const mediaAllowed = ['png','jpg','jpeg','gif','webp','bmp','heic','heif','mp4','webm','mov','m4v','avi','3gp'];
      const docAllowed = ['pdf','doc','docx','ppt','pptx','xls','xlsx','txt','zip','rar','7z'];
      if (uploadKind === 'media') {
        if ((!mediaAllowed.includes(ext)) && !isImage && !isVideo) {
          setStatus({{ t('media_not_supported_yet')|tojson }}, 'warning');
          return;
        }
      } else {
        if (!docAllowed.includes(ext)) {
          setStatus({{ t('document_not_supported_yet')|tojson }}, 'warning');
          return;
        }
      }
      const limit = isImage ? (25 * 1024 * 1024) : (isVideo ? (120 * 1024 * 1024) : (25 * 1024 * 1024));
      if (file.size > limit) {
        setStatus(isImage ? TEXT_ATTACHMENT_LIMIT_IMAGE : (isVideo ? TEXT_ATTACHMENT_LIMIT_VIDEO : TEXT_ATTACHMENT_LIMIT_FILE), 'warning');
        return;
      }
      let previewUrl = '';
      if (isImage || isVideo) previewUrl = URL.createObjectURL(file);
      pendingAttachment = { type: file.type || 'application/octet-stream', name: file.name, file, previewUrl, uploadKind };
      updateAttachmentPreview();
      setStatus({{ t('attachment_ready_to_send')|tojson }});
    } catch (err) {
      console.error(err);
      setStatus({{ t('attachment_processing_failed')|tojson }}, 'error');
    }
  };

  chatMediaInput?.addEventListener('change', async (e) => {
    const file = e.target.files?.[0];
    await prepareAttachment(file, 'media');
    e.target.value = '';
  });
  chatDocInput?.addEventListener('change', async (e) => {
    const file = e.target.files?.[0];
    await prepareAttachment(file, 'doc');
    e.target.value = '';
  });
  document.getElementById('toggleDanmakuBtn')?.addEventListener('click', () => socket.emit('toggle_danmaku', { enabled: !danmakuEnabled }));
  document.getElementById('chatHideBtn')?.addEventListener('click', () => setChatCollapsed(true));
  document.getElementById('chatShowBtn')?.addEventListener('click', () => setChatCollapsed(false));
}

const rtcDiagnostics = createRtcDiagnosticsController({
  getPeerConnections: () => ({}),
  getDiagnosticEntries: () => {
    if (!IS_LIVEKIT_MODE) return [];
    if (!livekitController) {
      return [{ label: 'LiveKit', lines: ['status: not initialized'] }];
    }
    return livekitController.getDiagnosticsEntries?.() || [];
  },
  getPeerLabel: (sid) => getDisplayName(sid),

    `participants: ${Object.keys(participantMeta).length + 1}`,
    `sharing: ${isSharingScreen ? 'yes' : 'no'}`,

    `virtual_bg: ${virtualBgEnabled ? 'on' : 'off'}`,
  ]),
  outputEl: rtcDiagnosticsOutput,
  intervalMs: 4000,
});
const refreshRtcDiagnostics = () => rtcDiagnostics.refresh();

function startRtcDiagnosticsLoop() {
  rtcDiagnostics.start();
}

function cleanupMeetingSession() {
  if (hasLeftMeeting) return;
  hasLeftMeeting = true;
  livekitLocalShareActive = false;
  clearShareStabilityMonitor();
  if (joinMediaBootstrapTimer) {
    clearTimeout(joinMediaBootstrapTimer);
    joinMediaBootstrapTimer = null;
  }
  try { virtualBackgroundController.cleanup(); } catch (_) {}
  rawPreviewVideo.srcObject = null;
  updateVirtualBackgroundButtonState();
  if (livekitController) {
    try { livekitController.disconnect(); } catch (_) {}
    livekitController = null;
  }
  try { recordingController.cleanup(); } catch (_) {}
  try { stopStreamTracks(localStream); } catch (_) {}
  try { stopStreamTracks(processedCanvasStream); } catch (_) {}
  remoteMediaStreams = {};
  rtcDiagnostics.reset();
  rtcDiagnostics.stop();
  participantMeta = {};
  window.participantMeta = participantMeta;
}

function leaveMeetingAndExit(message = TEXT_YOU_LEFT_MEETING, redirectUrl = '/') {
  cleanupMeetingSession();
  try { socket.emit('leave_room', { explicit: true }); } catch (_) {}
  try { socket.disconnect(); } catch (_) {}
  if (message) alert(message);
  window.location.href = redirectUrl;
}
