<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>登录 - 视频会议系统</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>
<div class="page auth-page">
    <div class="card auth-card">
        <div class="badge">Video Meeting</div>
        <h1>登录</h1>
        <p class="muted">先登录，再创建会议、加入会议、查看历史记录。</p>
        {% if error %}<div class="status error">{{ error }}</div>{% endif %}
        <form method="post" class="stack-lg">
            <div>
                <label>用户名</label>
                <input name="username" maxlength="32" placeholder="请输入用户名" required />
            </div>
            <div>
                <label>密码</label>
                <input name="password" type="password" minlength="6" placeholder="请输入密码" required />
            </div>
            <button type="submit">登录</button>
        </form>
        <div class="muted center mt16">还没有账号？<a href="{{ url_for('register') }}">立即注册</a></div>
    </div>
</div>
</body>
</html>
