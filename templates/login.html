<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>登录</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="page narrow">
  <div class="card">
    <h1>登录</h1>
    {% if request.args.get('registered') %}<div class="status ok">注册成功，请登录。</div>{% endif %}
    {% if request.args.get('kicked') %}<div class="status warn">你的账号已在其他设备登录，当前设备已退出。</div>{% endif %}
    {% if error %}<div class="status error">{{ error }}</div>{% endif %}
    <form method="post" class="stack">
      <label>用户名</label>
      <input name="username" maxlength="32" required>
      <label>密码</label>
      <input name="password" type="password" required>
      <button type="submit">登录</button>
    </form>
    <div class="muted small top-space">没有账号？<a href="{{ url_for('register') }}">去注册</a></div>
  </div>
</div>
</body>
</html>
