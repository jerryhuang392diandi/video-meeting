<!DOCTYPE html>
<html lang="{{ lang }}">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ t('meeting_room') }}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>
  <div class="shell room-shell">
    <header class="topbar compact">
      <div>
        <div class="brand">{{ t('meeting_room') }}</div>
        <div class="muted">{{ t('room_id') }}: {{ room_id }}</div>
      </div>
      <div class="top-actions">
        <span class="user-pill">{{ t('online_count') }}: <span id="participantCount">1</span></span>
        <a class="chip" href="{{ url_for('index') }}">{{ t('nav_home') }}</a>
      </div>
    </header>

    <section class="grid room-grid-layout">
      <aside class="panel side-panel">
        <h2>{{ t('permissions') }}</h2>
        <div class="stack-controls">
          <button class="primary-btn" id="requestMediaBtn">{{ t('request_media') }}</button>
          <button class="ghost-btn" id="switchCameraBtn">{{ t('switch_camera') }}</button>
          <button class="ghost-btn" id="shareScreenBtn">{{ t('share_screen') }}</button>
          <button class="ghost-btn" id="virtualBgBtn">{{ t('virtual_bg') }}</button>
          <button class="ghost-btn" id="toggleMicBtn">{{ t('mic') }}</button>
          <button class="ghost-btn" id="toggleCameraBtn">{{ t('camera') }}</button>
          <button class="ghost-btn danger" id="leaveBtn">{{ t('leave') }}</button>
        </div>
        <div id="statusBox" class="notice">Ready.</div>
        <div class="mini-panel">
          <div class="muted">{{ t('invite_link') }}</div>
          <div class="row-compact">
            <input id="inviteInput" readonly value="{{ request.url }}" />
            <button class="ghost-btn" id="copyInviteBtn">{{ t('copy') }}</button>
          </div>
        </div>
      </aside>

      <main class="panel video-panel">
        <div id="videoGrid" class="video-grid">
          <div class="video-card">
            <video id="localVideo" autoplay muted playsinline></video>
            <div class="video-label">You</div>
          </div>
        </div>
      </main>
    </section>
  </div>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script>
const ROOM_ID = {{ room_id|tojson }};
const ROOM_PASSWORD = {{ room_password|tojson }};
const USER_NAME = {{ current_user.username|tojson }};
const TEXT_PERMISSION_READY = {{ t('permission_ready')|tojson }};
const TEXT_PERMISSION_FAILED = {{ t('permission_failed')|tojson }};
const TEXT_VIRTUAL_BG = {{ t('virtual_bg_tip')|tojson }};
const TEXT_MEETING_CLOSED = {{ t('meeting_closed')|tojson }};
const TEXT_KICKED = {{ t('kicked')|tojson }};

const socket = io();
let localStream = null;
let currentFacingMode = 'user';
let peerConnections = {};

const localVideo = document.getElementById('localVideo');
const videoGrid = document.getElementById('videoGrid');
const participantCountEl = document.getElementById('participantCount');
const statusBox = document.getElementById('statusBox');
const rtcConfig = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };

function setStatus(msg, cls='') {
  statusBox.className = 'notice ' + cls;
  statusBox.textContent = msg;
}

async function requestMedia(forceFacingMode = null) {
  try {
    if (localStream) {
      localStream.getTracks().forEach(t => t.stop());
    }
    const constraints = {
      audio: true,
      video: forceFacingMode ? { facingMode: { ideal: forceFacingMode } } : true,
    };
    localStream = await navigator.mediaDevices.getUserMedia(constraints);
    localVideo.srcObject = localStream;
    replaceOutgoingTracks();
    setStatus(TEXT_PERMISSION_READY);
  } catch (err) {
    console.error(err);
    setStatus(TEXT_PERMISSION_FAILED + ': ' + err.message, 'error');
  }
}

function replaceOutgoingTracks() {
  Object.values(peerConnections).forEach(pc => {
    const senders = pc.getSenders();
    const vTrack = localStream?.getVideoTracks?.()[0];
    const aTrack = localStream?.getAudioTracks?.()[0];
    if (vTrack) {
      const vs = senders.find(s => s.track && s.track.kind === 'video');
      if (vs) vs.replaceTrack(vTrack);
    }
    if (aTrack) {
      const as = senders.find(s => s.track && s.track.kind === 'audio');
      if (as) as.replaceTrack(aTrack);
    }
  });
}

function ensurePeer(targetSid) {
  if (peerConnections[targetSid]) return peerConnections[targetSid];
  const pc = new RTCPeerConnection(rtcConfig);
  peerConnections[targetSid] = pc;

  if (localStream) {
    localStream.getTracks().forEach(track => pc.addTrack(track, localStream));
  }

  pc.onicecandidate = (event) => {
    if (event.candidate) {
      socket.emit('signal', { target: targetSid, from: socket.id, candidate: event.candidate });
    }
  };

  pc.ontrack = (event) => addRemoteVideo(targetSid, event.streams[0]);
  pc.onconnectionstatechange = () => {
    if (['disconnected', 'failed', 'closed'].includes(pc.connectionState)) {
      removeRemoteVideo(targetSid);
      delete peerConnections[targetSid];
    }
  };
  return pc;
}

function addRemoteVideo(sid, stream) {
  let card = document.getElementById('remote-' + sid);
  if (!card) {
    card = document.createElement('div');
    card.className = 'video-card';
    card.id = 'remote-' + sid;
    card.innerHTML = `<video autoplay playsinline></video><div class="video-label">${sid}</div>`;
    videoGrid.appendChild(card);
  }
  card.querySelector('video').srcObject = stream;
}

function removeRemoteVideo(sid) {
  document.getElementById('remote-' + sid)?.remove();
}

async function callPeer(targetSid) {
  const pc = ensurePeer(targetSid);
  const offer = await pc.createOffer();
  await pc.setLocalDescription(offer);
  socket.emit('signal', { target: targetSid, from: socket.id, description: pc.localDescription, senderName: USER_NAME });
}

socket.on('connect', async () => {
  if (!localStream) await requestMedia(currentFacingMode);
  socket.emit('join_room', { room_id: ROOM_ID, password: ROOM_PASSWORD, user_name: USER_NAME });
});

socket.on('join_ok', async (data) => {
  participantCountEl.textContent = data.participant_count;
  for (const p of data.participants) {
    await callPeer(p.sid);
  }
});

socket.on('participant_joined', async (data) => {
  participantCountEl.textContent = data.participant_count;
  await callPeer(data.sid);
});

socket.on('participant_left', (data) => {
  participantCountEl.textContent = data.participant_count;
  removeRemoteVideo(data.sid);
});

socket.on('join_error', (data) => {
  alert(data.message || 'Join failed');
  window.location.href = '/';
});

socket.on('force_leave', (data) => {
  alert(data.message || TEXT_MEETING_CLOSED);
  window.location.href = '/';
});

socket.on('signal', async (data) => {
  const from = data.from;
  const pc = ensurePeer(from);
  try {
    if (data.description) {
      await pc.setRemoteDescription(data.description);
      if (data.description.type === 'offer') {
        const answer = await pc.createAnswer();
        await pc.setLocalDescription(answer);
        socket.emit('signal', { target: from, from: socket.id, description: pc.localDescription, senderName: USER_NAME });
      }
    } else if (data.candidate) {
      await pc.addIceCandidate(data.candidate);
    }
  } catch (err) {
    console.error(err);
  }
});

document.getElementById('requestMediaBtn').onclick = () => requestMedia(currentFacingMode);
document.getElementById('switchCameraBtn').onclick = async () => {
  currentFacingMode = currentFacingMode === 'user' ? 'environment' : 'user';
  await requestMedia(currentFacingMode);
};
document.getElementById('toggleMicBtn').onclick = () => {
  const track = localStream?.getAudioTracks?.()[0];
  if (!track) return;
  track.enabled = !track.enabled;
  setStatus('Mic: ' + (track.enabled ? 'on' : 'off'));
};
document.getElementById('toggleCameraBtn').onclick = () => {
  const track = localStream?.getVideoTracks?.()[0];
  if (!track) return;
  track.enabled = !track.enabled;
  setStatus('Camera: ' + (track.enabled ? 'on' : 'off'));
};
document.getElementById('shareScreenBtn').onclick = async () => {
  try {
    const screenStream = await navigator.mediaDevices.getDisplayMedia({ video: true, audio: true });
    const screenTrack = screenStream.getVideoTracks()[0];
    Object.values(peerConnections).forEach(pc => {
      const sender = pc.getSenders().find(s => s.track && s.track.kind === 'video');
      if (sender) sender.replaceTrack(screenTrack);
    });
    localVideo.srcObject = screenStream;
    screenTrack.onended = async () => {
      await requestMedia(currentFacingMode);
    };
  } catch (err) {
    setStatus(err.message, 'error');
  }
};
document.getElementById('virtualBgBtn').onclick = () => alert(TEXT_VIRTUAL_BG);
document.getElementById('leaveBtn').onclick = () => {
  socket.emit('leave_room');
  window.location.href = '/';
};
document.getElementById('copyInviteBtn').onclick = async () => {
  await navigator.clipboard.writeText(document.getElementById('inviteInput').value);
  setStatus('Copied');
};
</script>
</body>
</html>
