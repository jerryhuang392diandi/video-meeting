<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>会议室 {{ room_id }}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>
<div class="page">
  <div class="card">
    {% if room_exists %}
    <div class="row between wrap">
      <div>
        <h1>会议室 {{ room_id }}</h1>
        <div class="muted small">请使用统一邀请链接加入会议。</div>
      </div>
      <div class="row gap wrap">
        <button id="copyLinkBtn" class="secondary">复制邀请链接</button>
        <a class="btn secondary" href="{{ url_for('index') }}">返回首页</a>
        <button id="leaveBtn" class="danger">离开会议</button>
      </div>
    </div>

    <div id="authBox" class="auth-box">
      <label>昵称</label>
      <input id="userName" placeholder="请输入昵称" maxlength="32" />
      <label>会议密码</label>
      <input id="roomPassword" placeholder="请输入会议密码" maxlength="6" value="{{ prefilled_password }}" />
      <button id="enterBtn">进入会议</button>
    </div>

    <div id="statusBox" class="status large">等待进入会议…</div>

    <div id="controls" class="row gap wrap hidden">
      <button id="toggleMicBtn">关闭麦克风</button>
      <button id="toggleCamBtn">关闭摄像头</button>
    </div>

    <div id="participants" class="muted">在线人数：0</div>

    <div class="video-grid" id="videoGrid">
      <div class="video-card" id="localCard">
        <div class="video-title">我</div>
        <video id="localVideo" autoplay muted playsinline></video>
      </div>
    </div>
    {% else %}
    <h1>会议不存在</h1>
    <a class="btn" href="{{ url_for('index') }}">返回首页</a>
    {% endif %}
  </div>
</div>

{% if room_exists %}
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script>
const ROOM_ID = "{{ room_id }}";
const PREFILLED_PASSWORD = "{{ prefilled_password }}";
const PREFILLED_NAME = new URLSearchParams(window.location.search).get('name') || '{{ current_user.username }}';
const USER_ID = {{ current_user.id }};

const authBox = document.getElementById('authBox');
const statusBox = document.getElementById('statusBox');
const participantsBox = document.getElementById('participants');
const controls = document.getElementById('controls');
const localVideo = document.getElementById('localVideo');
const videoGrid = document.getElementById('videoGrid');
const socket = io({ transports: ['websocket', 'polling'] });

let localStream = null;
let joined = false;
let mySid = null;
const peers = new Map();

document.getElementById('userName').value = PREFILLED_NAME;
document.getElementById('roomPassword').value = PREFILLED_PASSWORD;

document.getElementById('copyLinkBtn').addEventListener('click', async () => {
  const url = new URL(window.location.href);
  try {
    await navigator.clipboard.writeText(url.toString());
    setStatus('邀请链接已复制。');
  } catch {
    setStatus('复制失败，请手动复制地址栏。');
  }
});

document.getElementById('leaveBtn').addEventListener('click', leaveMeeting);
document.getElementById('enterBtn').addEventListener('click', enterMeeting);
document.getElementById('toggleMicBtn').addEventListener('click', toggleMic);
document.getElementById('toggleCamBtn').addEventListener('click', toggleCam);

function setStatus(msg) { statusBox.textContent = msg; }
function updateCount(n) { participantsBox.textContent = `在线人数：${n}`; }
function iceConfig() { return { iceServers: [{ urls: ['stun:stun.l.google.com:19302'] }] }; }

async function ensureLocalMedia() {
  if (localStream) return localStream;
  localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
  localVideo.srcObject = localStream;
  controls.classList.remove('hidden');
  return localStream;
}

function getOrCreateRemoteCard(sid, name) {
  let card = document.getElementById(`remote-${sid}`);
  if (card) return card.querySelector('video');
  card = document.createElement('div');
  card.className = 'video-card';
  card.id = `remote-${sid}`;
  card.innerHTML = `<div class="video-title">${name}</div><video autoplay playsinline></video>`;
  videoGrid.appendChild(card);
  return card.querySelector('video');
}

function cleanupPeer(sid) {
  const state = peers.get(sid);
  if (state) {
    try { state.pc.close(); } catch {}
    peers.delete(sid);
  }
  const card = document.getElementById(`remote-${sid}`);
  if (card) card.remove();
}

async function ensurePeer(sid, name) {
  if (peers.has(sid)) return peers.get(sid);
  const pc = new RTCPeerConnection(iceConfig());
  const remoteVideo = getOrCreateRemoteCard(sid, name || 'Remote');
  const state = { pc, name: name || 'Remote', pending: [] };
  peers.set(sid, state);

  localStream.getTracks().forEach(track => pc.addTrack(track, localStream));

  pc.onicecandidate = (e) => {
    if (e.candidate) {
      socket.emit('signal', { target: sid, payload: { type: 'candidate', candidate: e.candidate } });
    }
  };

  pc.ontrack = (e) => {
    remoteVideo.srcObject = e.streams[0];
  };

  return state;
}

async function enterMeeting() {
  if (joined) return;
  const userName = document.getElementById('userName').value.trim() || 'Guest';
  const password = document.getElementById('roomPassword').value.trim().toUpperCase();
  if (!password) return setStatus('请输入会议密码。');

  try {
    setStatus('正在验证并申请摄像头/麦克风...');
    const res = await fetch('/api/join_room', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ room_id: ROOM_ID, password })
    });
    const data = await res.json();
    if (!data.success) throw new Error(data.message || '验证失败');

    await ensureLocalMedia();
    joined = true;
    authBox.classList.add('hidden');
    socket.emit('join_room', { room_id: ROOM_ID, password, user_name: userName, user_id: USER_ID });
  } catch (err) {
    setStatus('进入失败：' + err.message);
  }
}

async function leaveMeeting() {
  socket.emit('leave_room');
  window.location.href = '{{ url_for("index") }}';
}

function toggleMic() {
  if (!localStream) return;
  const track = localStream.getAudioTracks()[0];
  track.enabled = !track.enabled;
  document.getElementById('toggleMicBtn').textContent = track.enabled ? '关闭麦克风' : '打开麦克风';
}

function toggleCam() {
  if (!localStream) return;
  const track = localStream.getVideoTracks()[0];
  track.enabled = !track.enabled;
  document.getElementById('toggleCamBtn').textContent = track.enabled ? '关闭摄像头' : '打开摄像头';
}

socket.on('join_error', (data) => {
  joined = false;
  setStatus('进入失败：' + (data.message || '未知错误'));
});

socket.on('join_ok', async (data) => {
  mySid = data.self_sid;
  updateCount(data.participant_count || 1);
  const existing = data.participants || [];
  for (const p of existing) {
    if (p.sid === mySid) continue;
    await ensurePeer(p.sid, p.name);
  }
  setStatus(existing.length ? '已进入会议，正在建立连接...' : '已进入会议，等待其他人加入...');
});

socket.on('participant_joined', async (data) => {
  if (!mySid || data.sid === mySid) return;
  updateCount(data.participant_count || 1);
  const state = await ensurePeer(data.sid, data.name);
  if (state.pc.signalingState !== 'stable') return;
  const offer = await state.pc.createOffer();
  await state.pc.setLocalDescription(offer);
  socket.emit('signal', { target: data.sid, payload: state.pc.localDescription });
});

socket.on('participant_left', (data) => {
  cleanupPeer(data.sid);
  updateCount(data.participant_count || 1);
  setStatus((data.name || '有人') + ' 离开了会议。');
});

socket.on('signal', async (data) => {
  const from = data.from;
  const payload = data.payload || {};
  if (!from || from === mySid) return;
  const state = await ensurePeer(from, data.name || 'Remote');
  const pc = state.pc;

  if (payload.type === 'offer') {
    await pc.setRemoteDescription(new RTCSessionDescription(payload));
    const answer = await pc.createAnswer();
    await pc.setLocalDescription(answer);
    socket.emit('signal', { target: from, payload: pc.localDescription });
  } else if (payload.type === 'answer') {
    await pc.setRemoteDescription(new RTCSessionDescription(payload));
  } else if (payload.type === 'candidate' && payload.candidate) {
    try { await pc.addIceCandidate(payload.candidate); } catch (e) { console.warn(e); }
  }
});

socket.on('force_logout', (data) => {
  alert(data.message || '你已被挤下线');
  window.location.href = '{{ url_for("login") }}?kicked=1';
});

socket.on('force_leave', (data) => {
  alert(data.message || '会议已结束');
  window.location.href = '{{ url_for("index") }}';
});
</script>
{% endif %}
</body>
</html>
