<!DOCTYPE html>
<html lang="{{ lang }}">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ t('register_title') }}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>
  <div class="shell auth-shell">
    <header class="topbar compact">
      <div>
        <div class="brand">{{ t('app_name') }}</div>
        <div class="muted">{{ t('subtitle') }}</div>
      </div>
      <div class="lang-switch">
        <a class="chip {% if lang == 'zh' %}active{% endif %}" href="{{ url_for('set_language', lang='zh') }}">{{ t('lang_zh') }}</a>
        <a class="chip {% if lang == 'en' %}active{% endif %}" href="{{ url_for('set_language', lang='en') }}">{{ t('lang_en') }}</a>
      </div>
    </header>

    <section class="hero-card auth-card">
      <div class="hero-copy">
        <h1>{{ t('register_title') }}</h1>
        <p>{{ t('hero_desc') }}</p>
      </div>
      <form method="post" class="form-card">
        {% if error %}
          <div class="notice error">{{ error }}</div>
        {% endif %}
        <label>{{ t('username') }}</label>
        <input name="username" maxlength="32" required />
        <label>{{ t('password') }}</label>
        <input name="password" type="password" required />
        <button class="primary-btn" type="submit">{{ t('submit_register') }}</button>
        <a class="text-link" href="{{ url_for('login') }}">{{ t('nav_login') }}</a>
      </form>
    </section>
  </div>
</body>
</html>
