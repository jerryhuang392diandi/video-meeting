<!DOCTYPE html>
<html lang="{{ lang }}">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#08111f" />
  <title>{% block title %}{{ t('app_name') }}{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css', v=asset_version('css/style.css')) }}" />
  {% block head %}{% endblock %}
</head>
<body>
  <div class="page-bg"></div>
  <div class="shell {% block shell_class %}{% endblock %}">
    {% block content %}{% endblock %}
  </div>
  <aside class="source-dock" aria-label="{{ t('source_code') }}">
    <span class="source-dock-label">{{ t('source_code') }}</span>
    <a class="source-link" href="https://github.com/jerryhuang392diandi/video-meeting" target="_blank" rel="noopener noreferrer" title="{{ t('github_repo') }}" aria-label="{{ t('github_repo') }}">
      <svg class="source-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
        <path d="M12 .5a12 12 0 0 0-3.8 23.4c.6.1.8-.2.8-.6v-2.1c-3.3.7-4-1.4-4-1.4-.5-1.3-1.3-1.7-1.3-1.7-1.1-.7.1-.7.1-.7 1.2.1 1.8 1.2 1.8 1.2 1 .1.6 2.8 3.4 2 .1-.8.4-1.3.7-1.6-2.6-.3-5.4-1.3-5.4-5.9 0-1.3.5-2.4 1.2-3.2-.1-.3-.5-1.6.1-3.2 0 0 1-.3 3.3 1.2a11.3 11.3 0 0 1 6 0C17.2 5.7 18.2 6 18.2 6c.6 1.6.2 2.9.1 3.2.8.8 1.2 1.9 1.2 3.2 0 4.6-2.8 5.6-5.4 5.9.4.4.8 1.1.8 2.2v2.8c0 .4.2.7.8.6A12 12 0 0 0 12 .5Z"/>
      </svg>
      <span>GitHub</span>
    </a>
    <a class="source-link" href="https://gitee.com/jerryhqx/video-meeting" target="_blank" rel="noopener noreferrer" title="{{ t('gitee_repo') }}" aria-label="{{ t('gitee_repo') }}">
      <span class="source-icon gitee-mark" aria-hidden="true">G</span>
      <span>Gitee</span>
    </a>
  </aside>
  <script>
    window.APP_TIMEZONE = {{ display_timezone|tojson }};
    window.renderLocalDateTimes = function () {
      const nodes = document.querySelectorAll('.local-datetime[data-utc]');
      const timezone = window.APP_TIMEZONE || Intl.DateTimeFormat().resolvedOptions().timeZone || '';
      nodes.forEach((node) => {
        const raw = node.getAttribute('data-utc');
        if (!raw) return;
        const date = new Date(raw);
        if (Number.isNaN(date.getTime())) return;
        const lang = document.documentElement.lang === 'zh' ? 'zh-CN' : 'en-US';
        const options = {
          year: 'numeric',
          month: '2-digit',
          day: '2-digit',
          hour: '2-digit',
          minute: '2-digit',
          second: '2-digit',
          hour12: false,
        };
        let activeTimezone = timezone;
        if (activeTimezone) options.timeZone = activeTimezone;
        let formatted;
        try {
          formatted = new Intl.DateTimeFormat(lang, options).format(date);
        } catch (_) {
          activeTimezone = Intl.DateTimeFormat().resolvedOptions().timeZone || '';
          delete options.timeZone;
          formatted = new Intl.DateTimeFormat(lang, options).format(date);
        }
        node.textContent = activeTimezone ? `${formatted} (${activeTimezone})` : formatted;
        node.title = `UTC: ${raw}`;
      });
    };
    document.addEventListener('DOMContentLoaded', window.renderLocalDateTimes);
    document.addEventListener('DOMContentLoaded', function () {
      const menus = Array.from(document.querySelectorAll('details.header-menu'));
      if (!menus.length) return;

      document.addEventListener('click', function (event) {
        menus.forEach((menu) => {
          if (!menu.contains(event.target)) {
            menu.removeAttribute('open');
          }
        });
      });

      document.addEventListener('keydown', function (event) {
        if (event.key === 'Escape') {
          menus.forEach((menu) => menu.removeAttribute('open'));
        }
      });
    });
  </script>
  {% block scripts %}{% endblock %}
</body>
</html>
