{% extends 'base.html' %}
{% block title %}{{ error_title or '404' }}{% endblock %}
{% block content %}
<section class="panel centered narrow-panel panel-glow">
  <div class="eyebrow">{{ error_title or '404' }}</div>
  <h1>{{ error_message or t('page_not_found') }}</h1>
  <p class="muted">{{ t('subtitle') }}</p>
  <a class="primary-btn anchor-btn" href="{{ url_for('index') }}">{{ t('back_home') }}</a>
</section>
{% endblock %}
