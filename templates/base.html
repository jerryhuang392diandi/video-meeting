<!DOCTYPE html>
<html lang="{{ lang }}">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#08111f" />
  <title>{% block title %}{{ t('app_name') }}{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
  {% block head %}{% endblock %}
</head>
<body>
  <div class="page-bg"></div>
  <div class="shell {% block shell_class %}{% endblock %}">
    {% block content %}{% endblock %}
  </div>
  <script>
    window.renderLocalDateTimes = function () {
      const nodes = document.querySelectorAll('.local-datetime[data-utc]');
      const timezone = Intl.DateTimeFormat().resolvedOptions().timeZone || '';
      nodes.forEach((node) => {
        const raw = node.getAttribute('data-utc');
        if (!raw) return;
        const date = new Date(raw);
        if (Number.isNaN(date.getTime())) return;
        const lang = document.documentElement.lang === 'zh' ? 'zh-CN' : 'en-US';
        const formatted = new Intl.DateTimeFormat(lang, {
          year: 'numeric',
          month: '2-digit',
          day: '2-digit',
          hour: '2-digit',
          minute: '2-digit',
          second: '2-digit',
          hour12: false,
        }).format(date);
        node.textContent = timezone ? `${formatted} (${timezone})` : formatted;
        node.title = `UTC: ${raw}`;
      });
    };
    document.addEventListener('DOMContentLoaded', window.renderLocalDateTimes);
  </script>
  {% block scripts %}{% endblock %}
</body>
</html>
